<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Price tag shape -->
  <g transform="translate(256,256) rotate(-15)">
    <!-- Tag body -->
    <rect x="-120" y="-80" width="240" height="160" rx="20" fill="url(#gold)"/>
    <!-- Tag triangle -->
    <polygon points="-120,-80 -120,80 -190,0" fill="url(#gold)"/>
    <!-- Tag hole -->
    <circle cx="-150" cy="0" r="18" fill="#0f172a"/>
    
    <!-- Shekel symbol ₪ -->
    <text x="20" y="25" font-family="Arial,sans-serif" font-size="100" font-weight="bold" fill="#0f172a" text-anchor="middle">₪</text>
  </g>
  
  <!-- Sparkles -->
  <text x="400" y="120" font-size="48" fill="#fbbf24" opacity="0.8">✨</text>
  <text x="90" y="430" font-size="36" fill="#fbbf24" opacity="0.6">✨</text>
  
  <!-- Down arrow (deals/savings) -->
  <g transform="translate(400,400)">
    <circle r="45" fill="#22c55e" opacity="0.9"/>
    <polygon points="0,22 -18,-8 -8,-8 -8,-22 8,-22 8,-8 18,-8" fill="white"/>
  </g>
</svg>
