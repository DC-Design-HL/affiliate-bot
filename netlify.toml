[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Force clean Next.js build — stale .next cache was serving pre-8115ec9 HTML
  # even after publishing commits that changed the Product JSON-LD schema.
  NETLIFY_NEXT_PLUGIN_SKIP_CACHE = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Cap Durable Cache TTL on dynamic pages so new deploys take effect quickly.
# Netlify was pinning review pages for 352 days, ignoring new builds.
[[headers]]
  for = "/reviews/*"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, s-maxage=3600, stale-while-revalidate=86400, durable"

[[headers]]
  for = "/"
  [headers.values]
    Netlify-CDN-Cache-Control = "public, s-maxage=3600, stale-while-revalidate=86400, durable"

[[redirects]]
  from = "/promo/*"
  to = "/reviews/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/api/tiktok/callback"
  to = "/.netlify/functions/tiktok-callback"
  status = 200
